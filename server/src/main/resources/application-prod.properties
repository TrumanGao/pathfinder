# Activated with -Dspring.profiles.active=prod (the packaged launcher sets this).
# Overrides development defaults for a portable, user-installable deployment.

# Store the H2 database under the user's home directory so the packaged app
# does not write into its installation folder (which may be read-only).
spring.datasource.url=jdbc:h2:file:${user.home}/.pathfinder/db/pathfinder;AUTO_SERVER=TRUE

# Disable the H2 web console in production.
spring.h2.console.enabled=false

# The jpackage launcher injects this via -Dpathfinder.graph.geojson-path=
# $APPDIR/data/full.geojson (see package.ps1), which overrides the value
# below and resolves to release\Pathfinder\app\data\full.geojson at runtime.
# The default here is only a fallback for running the jar directly
# (java -jar pathfinder.jar), where CWD is expected to contain data/.
pathfinder.graph.geojson-path=./data/full.geojson

# Park the parsed-graph cache alongside the H2 database under the user home,
# not next to the jar (whose install directory may be read-only, and which
# gets wiped on uninstall/upgrade). GraphCacheStore.write auto-creates the
# parent directory, and cache validity is keyed on source size+mtime so
# swapping the GeoJSON triggers a rebuild automatically.
pathfinder.graph.cache-path=${user.home}/.pathfinder/cache/graph-cache.bin

# Open a browser on startup (set to false to suppress).
pathfinder.launch.open-browser=true
