# Activated with -Dspring.profiles.active=prod (the packaged launcher sets this).
# Overrides development defaults for a portable, user-installable deployment.

# Store the H2 database under the user's home directory so the packaged app
# does not write into its installation folder (which may be read-only).
spring.datasource.url=jdbc:h2:file:${user.home}/.pathfinder/db/pathfinder;AUTO_SERVER=TRUE

# Disable the H2 web console in production.
spring.h2.console.enabled=false

# In the packaged jar the GeoJSON is bundled as a classpath resource; the
# filesystem path below will not exist, so GeoJsonLoader falls back to
# classpath:/data/full.geojson (bundled by the release Maven profile).
pathfinder.graph.geojson-path=${user.home}/.pathfinder/data/full.geojson

# Open a browser on startup (set to false to suppress).
pathfinder.launch.open-browser=true
